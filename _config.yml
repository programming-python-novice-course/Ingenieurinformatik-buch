# --------------------------------------------------
# Basis-Metadaten
# --------------------------------------------------
title: Ingenieurinformatik 1 - Programmieren (Python)
logo: figs/00-general/logo-cardrive.png
author: ""
email: christina_maria.mayr@hm.edu

exclude_patterns:
  - _build
  - Thumbs.db
  - .DS_Store
  - "**.ipynb_checkpoints"
  - README.md

only_build_toc_files: true

# --------------------------------------------------
# Notebook-Ausführung
# --------------------------------------------------
execute:
  execute_notebooks: auto  # off
  allow_errors: true       # due to CI setup in Gitlab
  timeout: 25

# --------------------------------------------------
# Literatur
# --------------------------------------------------
bibtex_bibfiles:
  - references.bib

# --------------------------------------------------
# PDF: behalte den funktionierenden Jupyter-Book-Wrapper
# --------------------------------------------------
latex:
  latex_documents:
    targetname: book.tex

# --------------------------------------------------
# Sphinx / Jupyter Book
# --------------------------------------------------
sphinx:
  language: de
  extra_extensions:
    - sphinx_exercise
    - sphinx_inline_tabs
    - sphinx_proof

  config:
    version: "2.5"
    release: "2.5.3"

    myst_enable_extensions:
      - dollarmath
      - amsmath
      - colon_fence
      - deflist

    myst_heading_anchors: 3


    html_static_path: ["_static"]
    html_css_files:
      - theme-overwrite.css
    html_js_files:
      - js/thebe-output-fix.js
      - js/hub-link-rewrite.js

    html_show_copyright: false
    language: de
    html_baseurl: https://ingenieurinformatik-buch-fcbc5c.pages.gitlab.lrz.de/
    html_favicon: figs/favicon/favicon.ico
    html_search_language: de

    bibtex_reference_style: author_year

    latex_engine: xelatex

    latex_elements:
      releasename: "Version"
      tableofcontents: |
        \chapter*{Hinweise}
        Dieses Buch ist durch Beiträge verschiedener Personen entstanden. 
        Die Herausgeberin allein ist für die Integration der Beiträge und der daraus resultierenden Buchfassung verantwortlich. 
        Eine Übersicht aller beitragenden Personen und ihrer Beiträge findet sich im Anhang unter „Beiträge“.\\

        \vspace*{0.1cm}

        Bei Fragen wenden Sie sich bitte an die Herausgeberin:
        \\
        Christina Maria Mayr
        \\
        Lehrbeauftragte Hochschule München, FK03
        \\
        www.christinamariamayr.de\\
        \vspace*{9cm}\\
        Dieses Werk ist lizenziert unter der\\
        Creative Commons Attribution-ShareAlike 4.0 International License (CC BY-SA 4.0).\\
        \href{https://creativecommons.org/licenses/by-sa/4.0/}{https://creativecommons.org/licenses/by-sa/4.0/}\\
        Sofern nicht anders angegeben, gilt diese Lizenz auch für Abbildungen, Grafiken und Fotos.


        % weiße Rückseite (leer, ohne Kopf-/Fußzeile)
        \clearpage
        \thispagestyle{empty}
        \null
        \clearpage

        \sphinxtableofcontents
      # Admonition-Styling im PDF (note/hint/important/tip + warning/caution/attention/danger/error)
      sphinxsetup: |
        noteborder=1pt,
        noteBorderColor={RGB}{210,210,210},
        warningborder=1pt,
        warningBorderColor={RGB}{200,80,80},
        cautionborder=1pt,
        cautionBorderColor={RGB}{200,200,80},
        attentionborder=1pt,
        attentionBorderColor={RGB}{200,80,200},
        dangerborder=1pt,
        dangerBorderColor={RGB}{200,80,80},
        errorborder=1pt,
        errorBorderColor={RGB}{200,80,80}
      fontpkg: |
        \usepackage{fontspec}
        \setmainfont{Latin Modern Roman}
        \usepackage{amsmath}
        \usepackage{amssymb}
        \usepackage{mathtools}
        % Unicode-Unterstützung für Subscripts und spezielle Zeichen
        \usepackage{unicode-math}
        \setmathfont{Latin Modern Math}
        % Box-Drawing-Zeichen unterstützen (verwende Latin Modern Mono als Fallback)
        \newfontfamily\boxfont{Latin Modern Mono}
        % Inhaltsverzeichnis aktivieren
        \usepackage{makeidx}
        \makeindex

      preamble: |
        % Hyperref-Konfiguration für bessere Bibliographie-Kompatibilität
        % (wird nach dem Laden von hyperref durch Sphinx ausgeführt)
        % Hinweis: hyperfootnotes wird bereits von Sphinx gesetzt, daher nicht nochmal setzen
        \hypersetup{
          pdfencoding=auto,
          psdextra,
          breaklinks=true,
          pdfborder={0 0 0},
          unicode=true
        }

        % --------------------------------------------------
        % PDF: Inhaltsverzeichnis-Tiefe (eine Ebene mehr)
        % tocdepth: 0=chapter, 1=section, 2=subsection, 3=subsubsection
        % --------------------------------------------------
        \setcounter{tocdepth}{2}
        \setcounter{secnumdepth}{2}

        % --------------------------------------------------
        % Inhaltsverzeichnis: Einträge nicht über Seiten trennen
        % --------------------------------------------------
        \usepackage{etoolbox}
        \usepackage{needspace}

        % Sorgt dafür, dass vor einem Inhaltsverzeichnis-Eintrag genug Platz bleibt.
        % Wenn nicht, wird vorher umgebrochen (statt mitten im Kapitel/Abschnittseintrag).
        \makeatletter
        \pretocmd{\l@part}{\Needspace{8\baselineskip}\addvspace{1.0\baselineskip}}{}{}
        \pretocmd{\l@chapter}{\Needspace{4\baselineskip}}{}{}
        \pretocmd{\l@section}{\Needspace{3\baselineskip}}{}{}
        \pretocmd{\l@subsection}{\Needspace{2\baselineskip}}{}{}
        \makeatother

        % --------------------------------------------------
        % PDF-only: Autor für die Titelseite setzen
        % (HTML bleibt sauber, da author: "" gesetzt ist)
        % --------------------------------------------------
        \AtBeginDocument{
          \author{
            \makebox[\linewidth][r]{Herausgeberin: Christina Maria Mayr}\\
            \makebox[\linewidth][r]{Hochschule München – Fakultät 03}
          }
          \date{SoSe 2026}
          \title{Ingenieurinformatik 1 - Programmieren \textit{Python}}
        }

        % --- Listenpunkte im PDF erzwingen (Bullet) ---
        \usepackage{enumitem}
        \setlist[itemize]{label=\textbullet}

