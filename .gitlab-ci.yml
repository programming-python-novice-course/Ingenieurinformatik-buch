image: ghcr.io/programming-python-novice-course/ingenieurinformatik-buch:latest

variables:
  DOCKER_DRIVER: overlay2

stages:
  - build
  - deploy

# Avoid duplicate pipelines for the same commit (e.g. push + MR pipeline).
# Prefer MR pipelines when a merge request is open; otherwise run normal branch pipelines.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

# ============================================================================
# BUILD JOBS
# ============================================================================

build_website_html:
  stage: build
  variables:
    HTML_BUILD_DIR: "_website_html"
    PYDEVD_DISABLE_FILE_VALIDATION: "1"
  before_script:
    # Fix permissions for CI_PROJECT_DIR so non-root user can write
    # This is safer than running all commands as root
    - chown -R $(id -u jovyan):$(id -g jovyan) "$CI_PROJECT_DIR" || true
  script:
    - export PYDEVD_DISABLE_FILE_VALIDATION=1
    - export MPLCONFIGDIR=/tmp/matplotlib
    - gosu jovyan bash -c "rm -rf _build $HTML_BUILD_DIR"
    - gosu jovyan bash -c "jupyter-book build . --path-output $HTML_BUILD_DIR --verbose"
    - gosu jovyan bash -c "python3 _scripts/patch_thebe_html.py --path-output $HTML_BUILD_DIR"
  artifacts:
    paths:
      - $HTML_BUILD_DIR/_build
    when: always

build_book_pdf:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: manual
      allow_failure: true
  variables:
    PDF_BUILD_DIR: "_book_as_pdf"
    PYDEVD_DISABLE_FILE_VALIDATION: "1"
  before_script:
    # Fix permissions for CI_PROJECT_DIR so non-root user can write
    # This is safer than running all commands as root
    - chown -R $(id -u jovyan):$(id -g jovyan) "$CI_PROJECT_DIR" || true
  script:
    - export PYDEVD_DISABLE_FILE_VALIDATION=1
    - export MPLCONFIGDIR=/tmp/matplotlib
    - |
      gosu jovyan sh -c 'find figs -name "*.gif" -print0 | while IFS= read -r -d "" gif; do
        png="${gif%.gif}.png"
        if [ ! -f "$png" ]; then
          convert "${gif}[0]" "$png" && echo "generated: $png"
        fi
      done'
    - gosu jovyan bash -c "export MPLCONFIGDIR=/tmp/matplotlib && export LATEXMKOPTS='-interaction=nonstopmode' && jupyter-book build . --builder pdflatex --path-output $PDF_BUILD_DIR --verbose"
  artifacts:
    paths:
      - $PDF_BUILD_DIR/_build/latex/book.pdf
      - $PDF_BUILD_DIR/_build/latex/book.log
    expire_in: 1 week
    when: always

build_book_pdf_print:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: manual
      allow_failure: true
  variables:
    PDF_PRINT_BUILD_DIR: "_book_as_pdf_print_version"
    PYDEVD_DISABLE_FILE_VALIDATION: "1"
  before_script:
    # Fix permissions for CI_PROJECT_DIR so non-root user can write
    # This is safer than running all commands as root
    - chown -R $(id -u jovyan):$(id -g jovyan) "$CI_PROJECT_DIR" || true
  script:
    - export PYDEVD_DISABLE_FILE_VALIDATION=1
    - export MPLCONFIGDIR=/tmp/matplotlib
    - gosu jovyan bash -c "rm -rf _build $PDF_PRINT_BUILD_DIR"
    - gosu jovyan python3 _scripts/generate_config_toc_print_version.py --input _toc.yml --output _toc_print.yml --config-input _config.yml --config-output _config_print.yml --stop-after chapters/misc/Expertenwissen/16-Expertenwissen --execute-notebooks-value auto --latex-targetname book-print.tex
    - |
      gosu jovyan sh -c 'find figs -name "*.gif" -print0 | while IFS= read -r -d "" gif; do
        png="${gif%.gif}.png"
        if [ ! -f "$png" ]; then
          convert "${gif}[0]" "$png" && echo "generated: $png"
        fi
      done'
    - gosu jovyan bash -c "export MPLCONFIGDIR=/tmp/matplotlib && export LATEXMKOPTS='-interaction=nonstopmode' && jupyter-book build . --config _config_print.yml --toc _toc_print.yml --builder pdflatex --path-output $PDF_PRINT_BUILD_DIR --verbose"
    - |
      echo ""
      echo "==================== PRINT PDF (reduced script) ===================="
      echo "This job generates a reduced/print-friendly version of the script."
      echo "Goal: keep the number of pages LOW."
      echo ""
      echo "Differences vs full PDF:"
      echo "- 'Expertenwissen' is excluded (cut-off in generate_config_toc_print_version.py)."
      echo "- Uses generated _config_print.yml and _toc_print.yml (created earlier in this job)."
      echo "- Code cells are not intended to be re-executed; execution is skipped when outputs exist."
      echo "====================================================================="
      echo ""
  artifacts:
    paths:
      - $PDF_PRINT_BUILD_DIR/_build/latex/book-print.pdf
      - $PDF_PRINT_BUILD_DIR/_build/latex/book-print.log
    expire_in: 1 week
    when: always

# ============================================================================
# DEPLOYMENT JOBS
# ============================================================================

deploy_pdf_in_gitlabLRZ:
  stage: deploy
  resource_group: ingenieurinformatik-download-main
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never
  needs:
    - job: build_book_pdf
      artifacts: true
  dependencies:
    - build_book_pdf
  variables:
    PDF_BUILD_DIR: "_book_as_pdf"
  script:
    - |
      VERSION="$(awk -F: '/^[[:space:]]*release:[[:space:]]*/{gsub(/"/,"",$2); gsub(/^[[:space:]]+|[[:space:]]+$/,"",$2); print $2; exit}' _config.yml)" && [ -n "$VERSION" ] || VERSION="unknown"
    - PDF_SOURCE="$PDF_BUILD_DIR/_build/latex/book.pdf"
    - PDF_FILENAME="Skript-${VERSION}.pdf"
    - DOWNLOAD_REPO="fk03ingenieurinformatik/ingenieurinformatik-download"
    - DOWNLOAD_BRANCH="main"
    - DOWNLOAD_REMOTE_PUSH="https://oauth2:${DOWNLOAD_REPO_TOKEN}@gitlab.lrz.de/${DOWNLOAD_REPO}.git"
    - rm -rf _github_download_repo
    - git clone --depth 1 --branch "$DOWNLOAD_BRANCH" "$DOWNLOAD_REMOTE_PUSH" _github_download_repo
    - cd _github_download_repo
    - git remote set-url origin "$DOWNLOAD_REMOTE_PUSH"
    - mkdir -p Downloads
    - cp "../${PDF_SOURCE}" "Downloads/${PDF_FILENAME}"
    - cp "../${PDF_SOURCE}" "Downloads/Skript-aktuell.pdf"
    - git add "Downloads/${PDF_FILENAME}" "Downloads/Skript-aktuell.pdf"
    - |
      if git diff --staged --quiet; then
        echo "No changes to push (PDF unchanged)"
      else
        git -c user.name="gitlab-ci" -c user.email="gitlab-ci@localhost" commit -m "Update Skript PDF ${VERSION} from ${CI_PROJECT_PATH}@${CI_COMMIT_SHA}"
        git push origin "$DOWNLOAD_BRANCH"
      fi

deploy_print_pdf_in_gitlabLRZ:
  stage: deploy
  resource_group: ingenieurinformatik-download-main
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never
  needs:
    - job: build_book_pdf_print
      artifacts: true
  dependencies:
    - build_book_pdf_print
  variables:
    PDF_PRINT_BUILD_DIR: "_book_as_pdf_print_version"
  script:
    - |
      VERSION="$(awk -F: '/^[[:space:]]*release:[[:space:]]*/{gsub(/"/,"",$2); gsub(/^[[:space:]]+|[[:space:]]+$/,"",$2); print $2; exit}' _config.yml)" && [ -n "$VERSION" ] || VERSION="unknown"
    - PDF_PRINT_SOURCE="$PDF_PRINT_BUILD_DIR/_build/latex/book-print.pdf"
    - PDF_PRINT_FILENAME="Skript-print-${VERSION}.pdf"
    - DOWNLOAD_REPO="fk03ingenieurinformatik/ingenieurinformatik-download"
    - DOWNLOAD_BRANCH="main"
    - DOWNLOAD_REMOTE_PUSH="https://oauth2:${DOWNLOAD_REPO_TOKEN}@gitlab.lrz.de/${DOWNLOAD_REPO}.git"
    - rm -rf _github_download_repo
    - git clone --depth 1 --branch "$DOWNLOAD_BRANCH" "$DOWNLOAD_REMOTE_PUSH" _github_download_repo
    - cd _github_download_repo
    - git remote set-url origin "$DOWNLOAD_REMOTE_PUSH"
    - mkdir -p "Downloads/Skript-Version-Printausgabe"
    - cp "../${PDF_PRINT_SOURCE}" "Downloads/Skript-Version-Printausgabe/${PDF_PRINT_FILENAME}"
    - cp "../${PDF_PRINT_SOURCE}" "Downloads/Skript-Version-Printausgabe/Skript-print-aktuell.pdf"
    - git add "Downloads/Skript-Version-Printausgabe/${PDF_PRINT_FILENAME}" "Downloads/Skript-Version-Printausgabe/Skript-print-aktuell.pdf"
    - |
      if git diff --staged --quiet; then
        echo "No changes to push (print PDF unchanged)"
      else
        git -c user.name="gitlab-ci" -c user.email="gitlab-ci@localhost" commit -m "Update Skript print PDF ${VERSION} from ${CI_PROJECT_PATH}@${CI_COMMIT_SHA}"
        git push origin "$DOWNLOAD_BRANCH"
      fi
    - |
      echo ""
      echo "==================== PRINT PDF DEPLOYMENT ===================="
      echo "Deploys the reduced/print-friendly PDF to the downloads repository."
      echo "File(s): Downloads/Skript-Version-Printausgabe/${PDF_PRINT_FILENAME} and Downloads/Skript-Version-Printausgabe/Skript-print-aktuell.pdf"
      echo "Goal: keep the number of pages LOW (reduced content, e.g. without 'Expertenwissen')."
      echo "=============================================================="
      echo ""

deploy_notebooks_in_gitlabLRZ:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never
  needs:
    - job: build_website_html
      artifacts: true
  dependencies:
    - build_website_html
  script:
    - SOURCE_DIR="_website_html/_build/jupyter_execute/chapters"
    - DEPLOY_REPO="fk03ingenieurinformatik/ingenieurinformatik-buch-deploy-lrz"
    - DEPLOY_BRANCH="master"
    - TARGET_DIR="deployed_notebooks"
    - DEPLOY_REMOTE_PUSH="https://oauth2:${DEPLOY_REPO_TOKEN}@gitlab.lrz.de/${DEPLOY_REPO}.git"
    - rm -rf _github_deploy_repo
    - git clone --depth 1 --branch "$DEPLOY_BRANCH" "$DEPLOY_REMOTE_PUSH" _github_deploy_repo
    - cd _github_deploy_repo
    - git remote set-url origin "$DEPLOY_REMOTE_PUSH"
    - echo "Syncing notebooks into ${TARGET_DIR}/ ..."
    - rm -rf "$TARGET_DIR"
    - mkdir -p "$TARGET_DIR"
    - cp -a "../${SOURCE_DIR}/." "$TARGET_DIR/"
    - |
      VERSION="$(awk -F: '/^[[:space:]]*release:[[:space:]]*/{gsub(/"/,"",$2); gsub(/^[[:space:]]+|[[:space:]]+$/,"",$2); print $2; exit}' ../_config.yml)" && [ -n "$VERSION" ] || VERSION="unknown"
    - |
      printf "%s\n" "These notebooks were generated automatically. Source commit: https://gitlab.lrz.de/fk03ingenieurinformatik/Ingenieurinformatik-buch/-/commit/${CI_COMMIT_SHA} (Release: ${VERSION})" > "$TARGET_DIR/Version.md"
    - git add -A
    - git -c user.name="gitlab-ci" -c user.email="gitlab-ci@localhost" commit -m "Update executed notebooks from ${CI_PROJECT_PATH}@${CI_COMMIT_SHA}"
    - echo "Pushing to GitLab..."
    - git push origin "$DEPLOY_BRANCH"

update_website:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never
  needs:
    - job: build_website_html
      artifacts: true
  dependencies:
    - build_website_html
  script:
    - 'echo "Pages accessible through ${CI_PAGES_URL}"'
  artifacts:
    paths:
      - _website_html/_build/html
  pages:
    publish: "_website_html/_build/html"

update_website_test:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH != "master"'
      when: on_success
    - when: never
  needs:
    - job: build_website_html
      artifacts: true
  dependencies:
    - build_website_html
  script:
    - 'echo "Pages accessible through ${CI_PAGES_URL}"'
  artifacts:
    paths:
      - _website_html/_build/html
  pages:
    publish: "_website_html/_build/html"
    path_prefix: "test"
